<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Lineage Graph</title>
<link rel="stylesheet" href="graph.css">
</head>
<body>

<header>
  <h1>Data Lineage</h1>
  <div class="header-badge">dbt · Redshift</div>
  <div class="header-sep"></div>
  <div id="tag-bar"></div>
  <div class="header-sep"></div>
  <div class="header-stat">nodes <span id="stat-nodes">—</span></div>
  <div class="header-stat" style="margin-left:16px">edges <span id="stat-edges">—</span></div>
</header>

<div id="canvas-wrap">
  <svg id="graph">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" class="edge-arrow" id="arrow-marker-path"/>
      </marker>
      <marker id="arrow-hi" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#4f7fff"/>
      </marker>
    </defs>
    <g id="scene"></g>
  </svg>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="resetView()">⟳ reset</button>
  <button class="ctrl-btn" onclick="zoomIn()">+ zoom</button>
  <button class="ctrl-btn" onclick="zoomOut()">− zoom</button>
  <button class="ctrl-btn" onclick="clearSelection()">clear</button>
</div>

<div id="tooltip"></div>

<script src="graph.js"></script>
</body>
</html>
